nav_items:
  - label: Home
    path: /
    icon: house
  - label: About
    path: /about
    icon: user
  - label: Archive
    path: /archives/
    icon: archive
  - label: RSS
    path: /atom.xml
    icon: rss

customize:
  vault_name: vaultex
  homepage_subtitle: Recent Notes   # Label shown in tab bar and breadcrumb on the homepage

  favicon: /images/favicon.ico

  logo:
    enabled: true
    url: /images/logo.png
    width: 32
    height: 32

  font_size: 15             # Base font size (px)
  code_font_size: 14        # Code block font size (px)
  max_content_width: 720    # Note content max-width (px)
  highlight: obsidian       # Code highlight theme


left_sidebar:
  show_nav_icons: true        # Show icons in the Navigation section
  show_category_icons: true   # Show folder/file icons in the Categories tree
  show_links_icons: true      # Show icons in the Links section
  explorer:
    style: 2                  # 1 = classic (NAVIGATION — uppercase, bold, dividers), 2 = Obsidian-style
    numbers: false            # style 2 only — prefix labels with 00 / 10 / 20 / 30

sidebar_right:
  toc: true                 # Generate TOC from post headings in right panel
  toc_depth: 3              # Max heading depth (1=h2 only, 3=h2-h4, etc.)
  show_related: true        # Related posts in right panel
  show_tags_panel: true     # Tag cloud in right panel

post_list:
  posts_per_row: 1        # 1 = list, 2 = card grid
  show_date: true         # Show post date in list
  show_tags: true         # Show tags in post list items
  max_tags: 6             # Max tags shown per post
  show_excerpt: true      # Show post excerpt in list
  show_thumbnail: true    # Show thumbnail image in post list cards (requires thumbnail or banner front-matter)
  thumbnail_style: inline # Thumbnail position in post list cards: left | right | inline


post:
  show_thumbnail: true    # Show thumbnail as hero image on individual post pages


social_links:
  - label: GitHub
    url: https://github.com/rashidmya/vaultex
    icon: github

# Vercel Analytics
vercel_analytics: false